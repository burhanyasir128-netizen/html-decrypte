<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium YT Extractor - Vercel Edition</title>
    <style>
        /* Modern Glassmorphism & Cyberpunk-inspired Design */
        body {
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; 
            padding: 40px; 
            width: 90%; 
            max-width: 550px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 { 
            text-align: center; 
            color: #00f2fe; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        .input-group { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 20px; 
        }

        input {
            flex: 1; 
            padding: 14px 18px; 
            border-radius: 10px; 
            border: none; 
            outline: none;
            background: rgba(0, 0, 0, 0.25); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00f2fe;
            background: rgba(0, 0, 0, 0.4);
        }

        button {
            padding: 14px 28px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer;
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            color: #000; 
            font-weight: 700; 
            text-transform: uppercase; 
            transition: 0.3s;
        }

        button:hover { 
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5); 
            transform: translateY(-2px);
        }

        .loader { 
            display: none; 
            text-align: center; 
            margin-top: 15px; 
            color: #00f2fe; 
            font-weight: 500;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        #result-section { 
            display: none; 
            margin-top: 30px; 
            text-align: center; 
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .thumbnail { 
            width: 100%; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            object-fit: cover;
        }

        .video-title { 
            font-size: 1.1rem; 
            margin-bottom: 20px; 
            font-weight: 600; 
            line-height: 1.4;
            color: #e0e0e0;
        }

        .download-options { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Scrollbar Styling for options */
        .download-options::-webkit-scrollbar { width: 6px; }
        .download-options::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .download-options::-webkit-scrollbar-thumb { background: #00f2fe; border-radius: 10px; }

        .dl-btn {
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .dl-btn span:last-child {
            background: #00f2fe;
            color: #000;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .dl-btn:hover { 
            background: rgba(255, 255, 255, 0.15); 
            border-color: #00f2fe; 
        }

        .dl-btn:hover span:last-child {
            background: #fff;
            box-shadow: 0 0 10px #00f2fe;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Media Extractor</h1>
        <div class="input-group">
            <input type="text" id="yt-url" placeholder="Paste YouTube Video Link Here...">
            <button onclick="fetchVideoDetails()">Extract</button>
        </div>
        <div class="loader" id="loader">Extracting Metadata from API...</div>
        
        <div id="result-section">
            <img id="thumb" class="thumbnail" src="" alt="Video Thumbnail">
            <div class="video-title" id="title"></div>
            <div class="download-options" id="options">
                </div>
        </div>
    </div>

    <script>
        function extractVideoID(url) {
            var regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            var match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : false;
        }

        async function fetchVideoDetails() {
            const urlInput = document.getElementById('yt-url').value;
            const videoId = extractVideoID(urlInput);
            
            if (!videoId) {
                alert('Invalid YouTube URL! Please enter a correct link.');
                return;
            }

            document.getElementById('loader').style.display = 'block';
            document.getElementById('result-section').style.display = 'none';
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = ''; 

            try {
                // Cache bypass param add kiya gaya hai
                const response = await fetch(`/api/download?video_id=${videoId}&t=${Date.now()}`);
                const data = await response.json();

                document.getElementById('loader').style.display = 'none';

                if (data.status === false || data.message) {
                    alert("Error: " + (data.message || "Unknown error"));
                    return;
                }

                document.getElementById('result-section').style.display = 'block';
                document.getElementById('title').innerText = data.title || "Video Extracted Successfully";
                
                // Robust Thumbnail Fallback Logic
                const imgElement = document.getElementById('thumb');
                const fallbackImage = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
                
                imgElement.src = data.thumb || fallbackImage;
                imgElement.onerror = function() {
                    this.onerror = null; // Infinite loop se bachne ke liye
                    this.src = fallbackImage; // Agar RapidAPI ka image toot jaye to YouTube se directly uthaye
                };

                // Generate Download Links (Multiple Formats)
                const videoFormats = data.link; 

                if (videoFormats && videoFormats.length > 0) {
                    let buttonsHTML = '';
                    videoFormats.forEach(format => {
                        let qualityText = format.quality;
                        let downloadUrl = format.link;
                        
                        buttonsHTML += `
                            <a href="${downloadUrl}" target="_blank" rel="noopener noreferrer" class="dl-btn">
                                <span>${qualityText}</span> 
                                <span>Download</span>
                            </a>
                        `;
                    });
                    optionsDiv.innerHTML = buttonsHTML;
                } else {
                    optionsDiv.innerHTML = '<p style="color: #ff4b4b;">No download links available for this video.</p>';
                }

            } catch (error) {
                document.getElementById('loader').style.display = 'none';
                alert('API Connection Failed! Ensure your Vercel API is correctly deployed.');
                console.error("Fetch Error: ", error);
            }
        }
    </script>
</body>
</html>
