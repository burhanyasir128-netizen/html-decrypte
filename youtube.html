<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Tool API Portal</title>
    <style>
        /* Modern Glassmorphism & Cyberpunk-inspired Design */
        body {
            margin: 0; 
            padding: 40px 20px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 40px;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; 
            padding: 40px; 
            width: 100%; 
            max-width: 550px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 { 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .yt-title { color: #00f2fe; }
        .wa-title { color: #25D366; }

        .input-group { display: flex; gap: 12px; margin-bottom: 20px; }

        input {
            flex: 1; padding: 14px 18px; border-radius: 10px; border: none; outline: none;
            background: rgba(0, 0, 0, 0.25); color: #fff; border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 1rem; transition: 0.3s;
        }

        input:focus { background: rgba(0, 0, 0, 0.4); }
        #yt-url:focus { border-color: #00f2fe; }
        #wa-phone:focus { border-color: #25D366; }

        button {
            padding: 14px 28px; border: none; border-radius: 10px; cursor: pointer;
            color: #000; font-weight: 700; text-transform: uppercase; transition: 0.3s;
        }
        
        .yt-btn { background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%); }
        .wa-btn { background: linear-gradient(45deg, #128C7E 0%, #25D366 100%); color: #fff; }
        
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .loader { display: none; text-align: center; margin-top: 15px; font-weight: 500; letter-spacing: 1px; animation: pulse 1.5s infinite; }
        .yt-loader { color: #00f2fe; }
        .wa-loader { color: #25D366; }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* Result Sections */
        .result-section { display: none; margin-top: 30px; text-align: center; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .thumbnail { width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); object-fit: cover; }
        .video-title { font-size: 1.1rem; margin-bottom: 20px; font-weight: 600; line-height: 1.4; color: #e0e0e0; }

        .download-options { display: flex; flex-direction: column; gap: 12px; max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .download-options::-webkit-scrollbar { width: 6px; }
        .download-options::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .download-options::-webkit-scrollbar-thumb { background: #00f2fe; border-radius: 10px; }

        .dl-btn {
            background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px 20px; border-radius: 8px; text-decoration: none; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s ease; font-size: 0.95rem;
        }
        .dl-btn span:last-child { background: #00f2fe; color: #000; padding: 5px 12px; border-radius: 5px; font-size: 0.85rem; font-weight: bold; }
        .dl-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: #00f2fe; }

        /* WhatsApp JSON Display */
        .json-display {
            background: rgba(0, 0, 0, 0.4); padding: 20px; border-radius: 10px; text-align: left;
            font-family: monospace; font-size: 0.9rem; color: #25D366; overflow-x: auto; border: 1px solid rgba(37, 211, 102, 0.2);
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1 class="yt-title">Media Extractor</h1>
        <div class="input-group">
            <input type="text" id="yt-url" placeholder="Paste YouTube Video Link Here...">
            <button class="yt-btn" onclick="fetchVideoDetails()">Extract</button>
        </div>
        <div class="loader yt-loader" id="yt-loader">Extracting Metadata...</div>
        
        <div class="result-section" id="yt-result">
            <img id="thumb" class="thumbnail" src="" alt="Video Thumbnail">
            <div class="video-title" id="title"></div>
            <div class="download-options" id="options"></div>
        </div>
    </div>

    <div class="glass-panel">
        <h1 class="wa-title">WA Business Checker</h1>
        <div class="input-group">
            <input type="number" id="wa-phone" placeholder="Enter Phone (e.g., 13022612667)">
            <button class="wa-btn" onclick="checkWhatsApp()">Check</button>
        </div>
        <div class="loader wa-loader" id="wa-loader">Checking Database...</div>
        
        <div class="result-section" id="wa-result">
            <div class="json-display" id="wa-data"></div>
        </div>
    </div>

    <script>
        // Aapki RapidAPI Key yahan store ki gayi hai
        const RAPID_API_KEY = '2e759a19c7msh1c675fa9484c71dp143b37jsn269390b5f3c4';

        // ----------------------------------------
        // 1. YOUTUBE LOGIC
        // ----------------------------------------
        function extractVideoID(url) {
            var regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            var match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : false;
        }

        async function fetchVideoDetails() {
            const urlInput = document.getElementById('yt-url').value;
            const videoId = extractVideoID(urlInput);
            
            if (!videoId) { alert('Invalid YouTube URL! Please provide a valid link.'); return; }

            document.getElementById('yt-loader').style.display = 'block';
            document.getElementById('yt-result').style.display = 'none';
            document.getElementById('options').innerHTML = ''; 

            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': RAPID_API_KEY,
                    'x-rapidapi-host': 'ytstream-download-youtube-videos.p.rapidapi.com'
                }
            };

            try {
                const response = await fetch(`https://ytstream-download-youtube-videos.p.rapidapi.com/dl?id=${videoId}`, options);
                const data = await response.json();
                
                document.getElementById('yt-loader').style.display = 'none';
                
                // Set Thumbnail and Fallback
                let videoThumb = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`; 
                if (data.thumbnail && Array.isArray(data.thumbnail) && data.thumbnail.length > 0) {
                    videoThumb = data.thumbnail[data.thumbnail.length - 1].url;
                }
                
                document.getElementById('yt-result').style.display = 'block';
                document.getElementById('title').innerText = data.title || "Video Ready for Download";
                
                const imgElement = document.getElementById('thumb');
                imgElement.src = videoThumb;
                imgElement.onerror = function() { this.onerror = null; this.src = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`; };

                // Extract Video & Audio Formats
                let links = [];
                if (data.formats && Array.isArray(data.formats)) {
                    data.formats.forEach(f => { if(f.url) links.push({ quality: `${f.qualityLabel || '360p'} (Video+Audio)`, link: f.url }); });
                }
                if (data.adaptiveFormats && Array.isArray(data.adaptiveFormats)) {
                    data.adaptiveFormats.forEach(f => {
                        if(f.url && f.mimeType.includes('audio')) links.push({ quality: `Audio Only (MP3)`, link: f.url });
                        if(f.url && f.mimeType.includes('video')) links.push({ quality: `${f.qualityLabel || 'HD'} (Video Only)`, link: f.url });
                    });
                }
                
                // Remove duplicates and render buttons
                const uniqueLinks = Array.from(new Map(links.map(item => [item.quality, item])).values());

                if (uniqueLinks.length > 0) {
                    let buttonsHTML = '';
                    uniqueLinks.forEach(format => {
                        buttonsHTML += `<a href="${format.link}" target="_blank" class="dl-btn"><span>${format.quality}</span> <span>Download</span></a>`;
                    });
                    document.getElementById('options').innerHTML = buttonsHTML;
                } else {
                    document.getElementById('options').innerHTML = '<p style="color:#ff4b4b;">No links found.</p>';
                }

            } catch (error) {
                document.getElementById('yt-loader').style.display = 'none';
                alert('YouTube API Connection Failed.');
                console.error(error);
            }
        }

        // ----------------------------------------
        // 2. WHATSAPP LOGIC
        // ----------------------------------------
        async function checkWhatsApp() {
            const phoneInput = document.getElementById('wa-phone').value.trim();
            if (!phoneInput) { alert('Please enter a valid phone number!'); return; }

            document.getElementById('wa-loader').style.display = 'block';
            document.getElementById('wa-result').style.display = 'none';

            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': RAPID_API_KEY,
                    'x-rapidapi-host': 'whatsapp-data.p.rapidapi.com'
                }
            };

            try {
                const response = await fetch(`https://whatsapp-data.p.rapidapi.com/bizname?phone=${phoneInput}`, options);
                const data = await response.json();
                
                document.getElementById('wa-loader').style.display = 'none';
                document.getElementById('wa-result').style.display = 'block';

                // Display exact JSON Response neatly
                document.getElementById('wa-data').innerHTML = `<pre>${JSON.stringify(data, null, 4)}</pre>`;

            } catch (error) {
                document.getElementById('wa-loader').style.display = 'none';
                alert('WhatsApp API Connection Failed.');
                console.error(error);
            }
        }
    </script>
</body>
</html>
